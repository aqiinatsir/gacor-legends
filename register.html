<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register – Gacor Legends</title>
  <link rel="stylesheet" href="auth.css">
</head>
<body>

<div class="particles" id="particles"></div>

<div class="auth-wrapper">
  <div class="auth-logo">
    <span id="authLogoSlot"></span>
    <h1>GACOR<br>LEGENDS</h1>
  </div>

  <div class="auth-card">
    <h2>Buat Akun</h2>
    <p class="subtitle">Bergabunglah dengan ribuan pemain legendaris</p>

    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>

    <div class="form-group">
      <label>Username</label>
      <input type="text" id="regUsername" placeholder="Masukkan username unik" autocomplete="off">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="regEmail" placeholder="email@kamu.com" autocomplete="off">
    </div>
    <div class="form-group">
      <label>Password</label>
      <div class="password-wrapper">
        <input type="password" id="regPassword" placeholder="Minimal 6 karakter">
        <span class="toggle-pass" onclick="togglePass('regPassword', this)">👁️</span>
      </div>
    </div>
    <div class="form-group">
      <label>Konfirmasi Password</label>
      <div class="password-wrapper">
        <input type="password" id="regConfirm" placeholder="Ulangi password kamu">
        <span class="toggle-pass" onclick="togglePass('regConfirm', this)">👁️</span>
      </div>
    </div>

    <button class="btn-auth" onclick="doRegister()">DAFTAR SEKARANG</button>

    <div class="auth-switch">
      Sudah punya akun? <a href="login.html">Masuk di sini</a>
    </div>
  </div>
</div>

<script>
  // Particles
  const pc = document.getElementById('particles');
  for(let i=0;i<30;i++){
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.cssText = `left:${Math.random()*100}%;--dur:${4+Math.random()*8}s;--delay:${Math.random()*6}s;`;
    pc.appendChild(p);
  }
</script>

<script src="app.js"></script>
<script>
  // Render logo SVG embedded
  renderAuthLogo();

  function togglePass(id, el){
    const inp = document.getElementById(id);
    if(inp.type==='password'){inp.type='text';el.textContent='🙈';}
    else{inp.type='password';el.textContent='👁️';}
  }

  function showError(msg){
    const el = document.getElementById('errorMsg');
    el.textContent = msg; el.classList.add('show');
    document.getElementById('successMsg').classList.remove('show');
  }
  function showSuccess(msg){
    const el = document.getElementById('successMsg');
    el.textContent = msg; el.classList.add('show');
    document.getElementById('errorMsg').classList.remove('show');
  }

  function doRegister(){
    const username = document.getElementById('regUsername').value.trim();
    const email    = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPassword').value;
    const confirm  = document.getElementById('regConfirm').value;

    if(!username||!email||!password||!confirm) return showError('Semua field harus diisi!');
    if(username.length < 3) return showError('Username minimal 3 karakter!');
    if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return showError('Format email tidak valid!');
    if(password.length < 6) return showError('Password minimal 6 karakter!');
    if(password !== confirm) return showError('Password tidak cocok!');

    const users = JSON.parse(localStorage.getItem('gl_users') || '[]');
    if(users.find(u => u.username === username)) return showError('Username sudah digunakan!');
    if(users.find(u => u.email === email)) return showError('Email sudah terdaftar!');

    users.push({
      username, email, password,
      avatar: null, bio: '',
      joined: new Date().toLocaleDateString('id-ID')
    });
    localStorage.setItem('gl_users', JSON.stringify(users));
    localStorage.setItem('gl_register_last', JSON.stringify({username, email}));

    showSuccess('Registrasi berhasil! Mengarahkan ke halaman login...');
    setTimeout(() => window.location.href = 'login.html', 1800);
  }
</script>
</body>
</html>
